[project]
name = "libghostty-vt"
version = "0.1.0"
description = "Pythonic Python bindings for libghostty-vt"
readme = "../../README.md"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    "libghostty-cffi",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/libghostty_vt"]
