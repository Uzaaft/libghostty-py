[project]
name = "libghostty-cffi"
version = "0.1.0"
description = "Raw CFFI bindings for libghostty-vt"
readme = "../../README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "cffi>=1.17",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.hooks.custom]
path = "../../hatch_build.py"

[tool.hatch.build.targets.wheel]
packages = ["src/libghostty_cffi"]
